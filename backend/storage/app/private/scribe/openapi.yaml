        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: gbailey@example.net
                phone:
                  type: string
                  description: 'Must be 11 digits.'
                  example: '82256977571'
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '|{+-0pBNvYgx'
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: w
                  nullable: true
                client_type:
                  type: string
                  description: ''
                  example: mobile
                  enum:
