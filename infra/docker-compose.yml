services:
  app:
    container_name: beddrop-app
    build:
      context: ../backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - beddrop-network

  nginx:
    container_name: beddrop-nginx
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    networks:
      - beddrop-network

  mysql:
    container_name: beddrop-mysql
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - beddrop-network

  redis:
    container_name: beddrop-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - beddrop-network

  queue:
    container_name: beddrop-queue
    build:
      context: ../backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - app
      - mysql
      - redis
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    restart: unless-stopped
    networks:
      - beddrop-network

networks:
  beddrop-network:

volumes:
  mysql_data:
  redis_data:
