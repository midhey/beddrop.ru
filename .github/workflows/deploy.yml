name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag to build/deploy. Defaults to commit SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/midhey/beddrop-backend
  FRONTEND_IMAGE: ghcr.io/midhey/beddrop-frontend

jobs:
  meta:
    name: Resolve deploy metadata
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'beddrop-web-v') }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Resolve image tag
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            image_tag="${RELEASE_TAG#beddrop-web-v}"
          elif [ -n "$INPUT_IMAGE_TAG" ]; then
            image_tag="$INPUT_IMAGE_TAG"
          else
            image_tag="$SHA"
          fi

          test -n "$image_tag" || { echo "Could not resolve image tag"; exit 1; }
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

  test:
    name: Test and build
    runs-on: ubuntu-latest
    needs: meta

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: gd, pdo_sqlite, sqlite3
          coverage: none

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run backend tests
        working-directory: backend
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: https://api.beddrop.ru/api/v1
        run: npm run build

  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - meta
      - test

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/midhey/beddrop-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
          - name: frontend
            image: ghcr.io/midhey/beddrop-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:${{ needs.meta.outputs.image_tag }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - meta
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Copy deploy files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH/infra/nginx'"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" docker-compose.prod.yml "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.prod.yml"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" infra/nginx/production.conf "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/infra/nginx/production.conf"

      - name: Write production env
        run: |
          cat > compose.env <<'ENVEOF'
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ needs.meta.outputs.image_tag }}
          FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ needs.meta.outputs.image_tag }}
          BEDDROP_ENV_FILE=.env
          ENVEOF

          cat > production.env <<'ENVEOF'
          BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}:${{ needs.meta.outputs.image_tag }}
          FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ needs.meta.outputs.image_tag }}

          APP_NAME=Beddrop
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://api.beddrop.ru
          FRONTEND_URL=https://beddrop.ru

          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US
          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=mysql
          DB_PORT=3306
          DB_DATABASE=${{ secrets.MYSQL_DATABASE }}
          DB_USERNAME=${{ secrets.MYSQL_USER }}
          DB_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null
          SESSION_SECURE_COOKIE=true
          SESSION_SAME_SITE=lax

          CORS_ALLOWED_ORIGINS=https://beddrop.ru
          AUTH_REFRESH_TOKEN_TTL=43200
          AUTH_REFRESH_TOKEN_LENGTH=80
          AUTH_REFRESH_COOKIE_NAME=laravel_refresh_token
          AUTH_REFRESH_COOKIE_DOMAIN=null
          AUTH_REFRESH_COOKIE_PATH=/api/v1/auth
          AUTH_REFRESH_COOKIE_SECURE=true
          AUTH_REFRESH_COOKIE_SAME_SITE=lax

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=public
          QUEUE_CONNECTION=database
          CACHE_STORE=redis

          REDIS_CLIENT=phpredis
          REDIS_HOST=redis
          REDIS_PASSWORD=null
          REDIS_PORT=6379

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS=hello@beddrop.ru
          MAIL_FROM_NAME="${APP_NAME}"

          DADATA_API_KEY=${{ secrets.DADATA_API_KEY }}
          DADATA_SECRET_KEY=${{ secrets.DADATA_SECRET_KEY }}
          VALHALLA_URL=http://valhalla:8002

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          SCRIBE_API_VERSION=1.0.0
          SCRIBE_AUTH_KEY=
          SCRIBE_DOCS_AUTH=false
          SCRIBE_RESPONSE_CALLS=false

          YOOKASSA_SHOP_ID=${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY=${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_RETURN_URL=https://beddrop.ru/orders
          YOOKASSA_WEBHOOK_URL=https://api.beddrop.ru/api/v1/payments/yookassa/webhook
          YOOKASSA_CAPTURE=true
          YOOKASSA_CURRENCY=RUB

          NUXT_PUBLIC_API_BASE=https://api.beddrop.ru/api/v1
          NUXT_PUBLIC_MAP_TILE_URL=https://tile.openstreetmap.org/{z}/{x}/{y}.png
          NUXT_PUBLIC_MAP_TILE_ATTRIBUTION="© OpenStreetMap contributors"
          ENVEOF
          scp -i ~/.ssh/deploy_key -P "${{ secrets.SSH_PORT }}" compose.env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/compose.env"
          scp -i ~/.ssh/deploy_key -P "${{ secrets.SSH_PORT }}" production.env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/.env"

      - name: Pull and restart services
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && \
            printf '%s\n' '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin && \
            docker compose --env-file compose.env -f docker-compose.prod.yml pull && \
            docker compose --env-file compose.env -f docker-compose.prod.yml up -d --remove-orphans && \
            docker compose --env-file compose.env -f docker-compose.prod.yml restart nginx && \
            docker compose --env-file compose.env -f docker-compose.prod.yml exec -T app php artisan migrate --force && \
            docker compose --env-file compose.env -f docker-compose.prod.yml exec -T app php artisan optimize:clear && \
            docker compose --env-file compose.env -f docker-compose.prod.yml exec -T app php artisan schedule:clear-cache && \
            docker compose --env-file compose.env -f docker-compose.prod.yml exec -T app php artisan config:cache && \
            docker compose --env-file compose.env -f docker-compose.prod.yml exec -T app php artisan route:cache"

      - name: Verify deployment
        run: |
          curl -fsS --retry 10 --retry-delay 3 https://api.beddrop.ru/up
          curl -fsS --retry 10 --retry-delay 3 https://api.beddrop.ru/api/ping
