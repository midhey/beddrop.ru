name: Mobile Android APK Start

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        type: string
      profile:
        description: "EAS build profile"
        required: true
        default: "apk"
        type: choice
        options:
          - apk
          - preview

permissions:
  contents: read

env:
  MOBILE_DIR: mobile/courier
  EXPO_PUBLIC_API_BASE: https://api.beddrop.ru/api/v1
  APP_ENV: production
  EXPO_PROJECT_ID: ${{ vars.EXPO_PROJECT_ID }}
  EXPO_OWNER: ${{ vars.EXPO_OWNER }}

jobs:
  start-apk-build:
    name: Start courier APK build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'beddrop-courier-v') }}

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PROFILE: ${{ inputs.profile }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
            version="${tag#beddrop-courier-v}"
            profile="apk"
          else
            version="$INPUT_VERSION"
            tag="beddrop-courier-v$version"
            profile="${INPUT_PROFILE:-apk}"
          fi

          case "$version" in
            ""|"$tag")
              echo "Could not resolve version from tag/input." >&2
              exit 1
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          test -n "$EXPO_TOKEN" || { echo "EXPO_TOKEN secret is required"; exit 1; }
          test -n "$EXPO_PROJECT_ID" || { echo "EXPO_PROJECT_ID repository variable is required"; exit 1; }
          test -n "$EXPO_OWNER" || { echo "EXPO_OWNER repository variable is required"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/courier/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.MOBILE_DIR }}
        run: npm ci

      - name: Typecheck
        working-directory: ${{ env.MOBILE_DIR }}
        run: npm run typecheck

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS APK build
        id: eas-build
        working-directory: ${{ env.MOBILE_DIR }}
        env:
          EAS_BUILD_PROFILE: ${{ steps.meta.outputs.profile }}
          APP_VERSION: ${{ steps.meta.outputs.version }}
          ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: |
          eas build \
            --platform android \
            --profile "$EAS_BUILD_PROFILE" \
            --non-interactive \
            --no-wait \
            --json > eas-build.json

          build_id="$(node - <<'NODE'
          const fs = require("fs");
          const raw = fs.readFileSync("eas-build.json", "utf8");
          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const id = build?.id;
          if (!id) {
            console.error(raw);
            throw new Error("EAS build ID was not found.");
          }
          process.stdout.write(id);
          NODE
          )"

          build_url="https://expo.dev/accounts/$EXPO_OWNER/projects/beddrop-courier/builds/$build_id"

          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "build_url=$build_url" >> "$GITHUB_OUTPUT"
          {
            echo "### EAS APK build started"
            echo
            echo "- Version: ${{ steps.meta.outputs.version }}"
            echo "- Release tag: ${{ steps.meta.outputs.tag }}"
            echo "- EAS profile: $EAS_BUILD_PROFILE"
            echo "- EAS build ID: \`$build_id\`"
            echo "- EAS build URL: $build_url"
            echo
            echo "When the EAS build is finished, run **Mobile Android APK Publish** with this build ID."
          } >> "$GITHUB_STEP_SUMMARY"

